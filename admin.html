<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:Arial,sans-serif;background:#f4f7f6;display:flex;height:100vh;overflow:hidden;}
        #sidebar{width:280px;min-width:240px;background:#2c3e50;color:#fff;display:flex;flex-direction:column;border-right:1px solid #1a252f;z-index:10;transition:transform .25s ease;}
        .sb-hd{padding:15px 12px;background:#1a252f;text-align:center;font-weight:bold;font-size:1rem;}
        #room-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
        .room-item{padding:14px 12px;border-bottom:1px solid #34495e;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:.9rem;word-break:break-all;}
        .room-item:hover{background:#34495e;}.room-item.active{background:#007bff;}
        .badge{background:#dc3545;color:#fff;border-radius:10px;padding:2px 7px;font-size:.75rem;font-weight:bold;margin-left:5px;}
        #main-chat{flex:1;display:flex;flex-direction:column;background:#efeae2;min-width:0;position:relative;z-index:5;}
        header{background:#007bff;color:#fff;padding:12px;text-align:center;font-size:1rem;font-weight:bold;display:flex;align-items:center;justify-content:center;gap:10px;}
        #back-btn{display:none;background:none;border:none;color:#fff;font-size:1.3rem;font-weight:bold;cursor:pointer;padding:0 5px;margin-right:auto;}
        #chat-window{flex:1;padding:15px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
        .msg-row{display:flex;gap:8px;align-items:flex-end;width:100%;}
        .msg-row.user{justify-content:flex-start;}.msg-row.admin{justify-content:flex-end;}
        .msg{max-width:75%;padding:9px 12px;border-radius:10px;font-size:.9rem;line-height:1.3;word-wrap:break-word;box-shadow:0 1px 1px rgba(0,0,0,0.1);}
        .user{background:#fff;border:1px solid #e0e0e0;color:#333;border-top-left-radius:0;}
        .admin{background:#d9fdd3;color:#333;border-top-right-radius:0;}
        .input-area{display:flex;padding:10px;background:#f0f2f5;border-top:1px solid #ddd;gap:8px;align-items:center;z-index:9999;position:relative;}
        input{flex:1;padding:10px 14px;border:1px solid #fff;border-radius:20px;outline:none;font-size:.95rem;min-width:0;background:#fff;box-shadow:0 1px 1px rgba(0,0,0,0.05);position:relative;z-index:10000;-webkit-user-select:text;user-select:text;}
        input:focus{border-color:#007bff;}
        button{background:#007bff;color:#fff;border:none;padding:10px 18px;border-radius:20px;font-weight:bold;cursor:pointer;font-size:.95rem;white-space:nowrap;position:relative;z-index:10000;}
        button:hover{background:#0056b3;}
        .no-room-selected{display:flex;flex:1;align-items:center;justify-content:center;color:#7f8c8d;font-size:.95rem;text-align:center;padding:15px;background:#f8f9fa;}
        @media (max-width:768px){
            body{position:relative;}
            #sidebar{width:100%;max-width:100%;position:absolute;left:0;top:0;height:100%;transform:translateX(0);}
            #main-chat{position:absolute;left:0;top:0;width:100%;height:100%;transform:translateX(100%);}
            body.viewing-chat #sidebar{transform:translateX(-100%);}
            body.viewing-chat #main-chat{transform:translateX(0);}
            body.viewing-chat #back-btn{display:block;}
        }
    </style>
</head>
<body>
<script>
const ADMIN_PASS="Mityana9";
if(sessionStorage.getItem('adminAuth')!=='true'){
  const p=prompt("🔒 Admin Login Required\nEnter Password:");
  if(p!==ADMIN_PASS){document.body.innerHTML="<h2 style='text-align:center;margin-top:100px;color:#dc3545'>Access Denied</h2>";throw new Error("!");}
  else{sessionStorage.setItem('adminAuth','true');}
}
</script>
<div id="sidebar">
    <div class="sb-hd">Active Channels</div>
    <div id="room-list"></div>
</div>
<div id="main-chat">
    <header><button id="back-btn" onclick="closeChat()">←</button><span id="chat-header">Select a chat room</span></header>
    <div id="chat-window" class="no-room-selected">No Chat Mounted</div>
    <div class="input-area" style="display:none;" id="input-container">
        <input type="text" id="admin-message" placeholder="Type reply here..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>
</div>
<script>
    const API_URL="/api/chat";let selectedRoomId=null,totalMessagesSeen=0;
    const inputField=document.getElementById('admin-message'),sendButton=document.getElementById('send-btn');
    if(inputField){
      inputField.addEventListener('mousedown',e=>e.stopPropagation(),{capture:true});
      inputField.addEventListener('click',e=>{e.stopPropagation();inputField.focus();},{capture:true});
      inputField.addEventListener('keydown',e=>{e.stopPropagation();if(e.key==='Enter'){e.preventDefault();sendReply();}},{capture:true});
    }
    async function loadRooms(){
        try{
            const r=await fetch(`${API_URL}?type=list`);if(!r.ok)return;const rms=await r.json();
            const box=document.getElementById('room-list');box.innerHTML='';
            rms.sort((a,b)=>b.lastActive-a.lastActive);
            rms.forEach(rm=>{
                const el=document.createElement('div');el.className=`room-item ${selectedRoomId===rm.id?'active':''}`;
                el.innerHTML=`<span>💬 ${rm.id}</span>`;
                if(rm.adminUnread>0&&selectedRoomId!==rm.id){
                    const bd=document.createElement('span');bd.className='badge';bd.textContent=rm.adminUnread;el.appendChild(bd);
                }
                el.onclick=()=>openRoom(rm.id);box.appendChild(el);
            });
        }catch(e){}
    }
    async function openRoom(id){
        selectedRoomId=id;totalMessagesSeen=0;document.getElementById('chat-header').textContent=id;
        const win=document.getElementById('chat-window');win.className='';win.innerHTML='';
        document.getElementById('input-container').style.display='flex';document.body.classList.add('viewing-chat');
        await fetch(API_URL,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({roomId:selectedRoomId,clearFor:'admin'})});
        getMessages();
    }
    function closeChat(){
        document.body.classList.remove('viewing-chat');selectedRoomId=null;totalMessagesSeen=0;
        document.getElementById('chat-header').textContent="Select a chat room";
        const win=document.getElementById('chat-window');win.className='no-room-selected';win.innerHTML="No Chat Mounted";
        document.getElementById('input-container').style.display='none';loadRooms();
    }
    async function getMessages(){
        if(!selectedRoomId)return;
        try{
            const r=await fetch(`${API_URL}?roomId=${selectedRoomId}`);if(!r.ok)return;const d=await r.json();
            if(d.messages.length!==totalMessagesSeen){
                const win=document.getElementById('chat-window');const fsc=(document.activeElement===inputField);win.innerHTML='';
                d.messages.forEach(mStr=>{
                    try{
                        const m=JSON.parse(mStr);const row=document.createElement('div');row.className=`msg-row ${m.sender}`;
                        row.innerHTML=`<div class="msg ${m.sender}">${m.text}</div>`;win.appendChild(row);
                    }catch(e){}
                });
                win.scrollTop=win.scrollHeight;if(fsc)inputField.focus();totalMessagesSeen=d.messages.length;
                await fetch(API_URL,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({roomId:selectedRoomId,clearFor:'admin'})});
            }
        }catch(e){}
    }
    async function sendReply(){
        const txt=inputField.value.trim();if(!txt||!selectedRoomId)return;inputField.value='';
        try{
            await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sender:'admin',text:txt,roomId:selectedRoomId})});
            getMessages();
        }catch(e){}
    }
    sendButton.onclick=sendReply;setInterval(loadRooms,3000);setInterval(getMessages,3000);loadRooms();
</script>
</body>
</html>
