<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"><title>Admin</title><link rel="manifest" href="/manifest.json"><meta name="theme-color" content="#202c33"><style>*{box-sizing:border-box;margin:0;padding:0;}body,html{height:100vh;height:100dvh;background:#111b21;color:#e9edef;font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;overflow:hidden;}#app{display:flex;height:100vh;height:100dvh;width:100vw;position:relative;}#sidebar{width:100%;background:#111b21;color:#e9edef;display:flex;flex-direction:column;border-right:1px solid #222e35;z-index:10;transition:transform .2s ease;position:absolute;left:0;top:0;height:100%;}body.viewing-chat #sidebar{transform:translateX(-100%);}#sidebar{transition:transform .25s ease;}
.shd{padding:10px;background:#202c33;font-weight:bold;font-size:.95rem;display:flex;justify-content:space-between;align-items:center;}.ref-btn{background:#00a884;color:#111b21;border:none;padding:4px 8px;border-radius:12px;font-size:.7rem;font-weight:bold;cursor:pointer;}#room-list{flex:1;overflow-y:auto;}.rm-it{padding:10px;border-bottom:1px solid #222e35;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:.8rem;word-break:break-all;}.rm-it:hover{background:#202c33;}.rm-it.active{background:#2a3942;}.rm-lbl{display:flex;flex-direction:column;gap:1px;}.rm-lbl .sub-id{font-size:0.6rem;color:#8696a0;}.badge{background:#00a884;color:#111b21;border-radius:10px;padding:1px 4px;font-size:.6rem;font-weight:bold;margin-left:4px;}#main-chat{flex:1;display:flex;flex-direction:column;background:#0b141a;min-width:0;position:absolute;left:0;top:0;width:100%;height:100%;transform:translateX(100%);transition:transform .25s ease;z-index:11;pointer-events:none;}body.viewing-chat #main-chat{transform:translateX(0);pointer-events:auto;}

/* HEADER FIX FOR MOBILE */
header{background:#202c33;color:#e9edef;padding:10px;padding-top:calc(10px + env(safe-area-inset-top));text-align:center;font-size:.9rem;font-weight:bold;display:flex;align-items:center;justify-content:space-between;gap:4px;box-shadow:0 1px 2px rgba(0,0,0,0.3);position:fixed;top:0;left:0;width:100%;z-index:9999;}
.hdr-center{display:flex;align-items:center;justify-content:center;gap:4px;flex:1;overflow:hidden;}
#back-btn{display:block;background:none;border:none;color:#00a884;font-size:1.2rem;font-weight:bold;cursor:pointer;padding:0 2px;flex-shrink:0;}
#del-thread-btn{background:none;border:none;font-size:1.1rem;cursor:pointer;padding:0 2px;opacity:1;flex-shrink:0;}

#chat-window{flex:1;padding:60px 9px 70px 9px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;background:#0b141a;background-image:url('https://user-images.githubusercontent.com/150825/134145281-0f2e3a1a-5c3e-4a5a-9a5a-1a1a1a1a1a1a.png');background-size:400px;background-repeat:repeat;}

/* WHATSAPP BUBBLES */
.msg-row{width:100%;display:flex;margin-bottom:3px;}
.msg-row.user{justify-content:flex-start;padding-left:8px;}
.msg-row.admin{justify-content:flex-end;padding-right:8px;}
.msg{max-width:65%;display:inline-block;padding:6px 7px 8px 9px;border-radius:7.5px;font-size:15px;line-height:19px;word-wrap:break-word;position:relative;box-shadow:0 1px 0.5px rgba(0,0,0,0.13);}
.user{background:#202c33;color:#e9edef;border-top-left-radius:0;}
.user::before{content:"";position:absolute;left:-8px;top:0;border:4px solid transparent;border-right:4px solid #202c33;border-top:4px solid #202c33;}
.admin{background:#005c4b;color:#e9edef;border-top-right-radius:0;}
.admin::before{content:"";position:absolute;right:-8px;top:0;border:4px solid transparent;border-left:4px solid #005c4b;border-top:4px solid #005c4b;}

.input-area{display:flex;padding:6px;background:#202c33;border-top:1px solid #222e35;gap:6px;align-items:center;width:100%;position:fixed;bottom:0;left:0;z-index:9999;padding-bottom:calc(6px + env(safe-area-inset-bottom));justify-content:center;}input{flex:1;padding:9px 12px;border:none;border-radius:8px;outline:none;font-size:.9rem;min-width:0;background:#2a3942;color:#fff;}input::placeholder{color:#8696a0;}button#send-btn{background:#00a884;color:#111b21;border:none;padding:9px 16px;border-radius:8px;font-weight:bold;cursor:pointer;font-size:.9rem;}

/* DESKTOP: side by side */
@media(min-width:769px){
  #sidebar{width:320px;position:relative;transform:none!important;}
  #main-chat{position:relative;transform:none!important;width:calc(100% - 320px);z-index:5;}
  header{position:relative;width:auto;}
  #chat-window{padding:12px 9px 12px 9px;}
  #back-btn{display:none!important;}
  body.viewing-chat #sidebar{transform:none!important;}
  .input-area{position:absolute;width:100%;left:0;bottom:0;}
  #admin-message{max-width:600px;}
}</style></head><body><div id="app"><div id="sidebar"><div class="shd" style="display:flex;flex-direction:column;gap:2px;align-items:flex-start;"><div style="display:flex;justify-content:space-between;width:100%;align-items:center;"><span id="sys-status" style="font-size:1.1rem;letter-spacing:0.5px;font-weight:bold;">LIVE SUPPORT</span><button class="ref-btn" onclick="loadRooms()">Sync 🔄</button></div><span style="font-size:0.7rem;color:#8696a0;font-weight:normal;text-transform:lowercase;">website chats</span></div><div id="room-list"></div></div><div id="main-chat"><header><button id="back-btn" onclick="closeChat()">← Back</button><div class="hdr-center"><span id="chat-header">Select a room</span></div><button id="del-thread-btn" onclick="triggerThreadWipe()">🗑️</button></header><div id="chat-window" class="no-room-selected">No Chat Mounted</div><div class="input-area" style="display:none;" id="input-container"><input type="text" id="admin-message" placeholder="Type reply here..." autocomplete="off"><button id="send-btn">Send</button></div></div></div><script>const API_URL="/api/chat";let selectedRoomId=null,selectedName="User",totalMessagesSeen=-1,isFetching=false,holdTimer=null;const HOLD_DURATION=700,inputField=document.getElementById('admin-message'),sendButton=document.getElementById('send-btn'),ADMIN_PASS="Mityana9";if(sessionStorage.getItem('adminAuth')!=='true'){const p=prompt("🔒 Admin Login Required\nEnter Password:");if(p!==ADMIN_PASS){document.body.innerHTML="<h2 style='text-align:center;margin-top:100px;color:#dc3545'>Access Denied</h2>";throw new Error("!");}else{sessionStorage.setItem('adminAuth','true');}}async function loadRooms(){try{const r=await fetch(`${API_URL}?type=list`);if(!r.ok)return;const rms=await r.json(),box=document.getElementById('room-list');box.innerHTML='';rms.sort((a,b)=>b.lastActive-a.lastActive);rms.forEach(rm=>{const cleanId=rm.id.replace('chat:room:','').replace('chat:unread:','');const el=document.createElement('div');el.className=`rm-it ${selectedRoomId===cleanId?'active':''}`;const lbl=document.createElement('div');lbl.className='rm-lbl';lbl.innerHTML=`<span>👤 ${rm.displayName||'Guest User'}</span><span class="sub-id">${cleanId}</span>`;el.appendChild(lbl);if(rm.adminUnread>0&&selectedRoomId!==cleanId){const bd=document.createElement('span');bd.className='badge';bd.textContent=rm.adminUnread;el.appendChild(bd);}el.onclick=()=>openRoom(cleanId,rm.displayName||'Guest User');box.appendChild(el);});}catch(e){}}function openRoom(id,name){selectedRoomId=id.replace('chat:room:','').replace('chat:unread:','');selectedName=name;totalMessagesSeen=-1;document.getElementById('chat-header').textContent=selectedName;const win=document.getElementById('chat-window');win.className='';win.innerHTML='';document.getElementById('input-container').style.display='flex';document.body.classList.add('viewing-chat');getMessages();setTimeout(()=>{inputField.focus();},100);}function closeChat(){document.body.classList.remove('viewing-chat');selectedRoomId=null;totalMessagesSeen=-1;document.getElementById('chat-header').textContent="Select a room";const win=document.getElementById('chat-window');win.className='no-room-selected';win.innerHTML="No Chat Mounted";document.getElementById('input-container').style.display='none';loadRooms();}async function getMessages(){if(!selectedRoomId||isFetching)return;isFetching=true;try{const cleanId=selectedRoomId.replace('chat:room:','').replace('chat:unread:','');const r=await fetch(`${API_URL}?roomId=${cleanId}`);if(!r.ok){isFetching=false;return;}const d=await r.json(),messageList=d.messages||[];if(messageList.length!==totalMessagesSeen){const win=document.getElementById('chat-window');win.innerHTML='';messageList.forEach(mStr=>{try{let txt="",snd="user";if(mStr&&typeof mStr==='object'){txt=mStr.text||"";snd=mStr.sender||"user";}else if(typeof mStr==='string'){let clean=mStr.trim();if(clean.startsWith("{")||clean.startsWith("[")){const m=JSON.parse(clean);txt=m.text||"";snd=m.sender||"user";}else{txt=mStr;}}if(txt){const row=document.createElement('div');row.className=`msg-row ${snd}`;row.innerHTML=`<div class="msg">${txt}</div>`;win.appendChild(row);}}catch(err){}});win.scrollTop=win.scrollHeight;totalMessagesSeen=messageList.length;fetch(API_URL,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({roomId:cleanId,clearFor:'admin'})}).catch(()=>{});}}catch(e){}isFetching=false;}async function sendReply(){const txt=inputField.value.trim();if(!txt||!selectedRoomId)return;const cleanId=selectedRoomId.replace('chat:room:','').replace('chat:unread:','');inputField.value='';try{const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sender:'admin',text:txt,roomId:cleanId})});if(res.ok){await getMessages();setTimeout(()=>{inputField.focus();},30);}}catch(e){}}async function triggerTargetedWipe(roomId,roomName){clearTimeout(holdTimer);if(!roomId||!confirm(`⚠️ Delete all history for ${roomName}?`))return;const cleanId=roomId.replace('chat:room:','').replace('chat:unread:','');try{const res=await fetch(API_URL,{method:'DELETE',headers:{'Content-Type':'application/json','X-Admin-Auth':'Mityana9'},body:JSON.stringify({roomId:cleanId})});if(res.ok){alert("🗑 extinction complete.");if(selectedRoomId===cleanId){closeChat();}else{loadRooms();}}}catch(err){alert("🚨 Error.");}}function triggerThreadWipe(){if(selectedRoomId)triggerTargetedWipe(selectedRoomId,selectedName);}sendButton.onclick=sendReply;inputField.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();sendReply();}};

// PWA REGISTER
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js');
  });
}

let deferredPrompt; 
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault(); 
  deferredPrompt = e; 
  
  // Forces the native installation prompt to pop up instantly after 1 second
  setTimeout(() => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt = null;
    }
  }, 1000);
});

async function sequenceLoop(){await loadRooms();if(selectedRoomId){await getMessages();}setTimeout(sequenceLoop,4000);}sequenceLoop();</script></body></html>
