<script>
document.addEventListener('DOMContentLoaded', function(){ // WRAPPED IN DOMREADY

// Nav scroll - FIXED: calculate header height on each click
function goTo(id){
  const header = document.querySelector('header');
  const headerHeight = header? header.offsetHeight + 10 : 60;
  const target = document.querySelector(id);
  if(!target) return;
  const y = target.getBoundingClientRect().top + window.pageYOffset - headerHeight;
  window.scrollTo({top:y, behavior:'smooth'});
}

const tabs = document.querySelectorAll('.t');
tabs.forEach(tab => {
  tab.addEventListener('click', e => {
    e.preventDefault();
    goTo(tab.getAttribute('href'));
  }, {passive:false});
});

// More menu
const m=document.getElementById('m'),n=document.getElementById('n');
document.querySelectorAll('.n a').forEach(a => {
  a.addEventListener('click', (e) => {
    e.preventDefault();
    goTo(a.getAttribute('href'));
    n.classList.remove('a');m.classList.remove('active');
  });
});
m.onclick=e=>{e.stopPropagation();n.classList.toggle('a');m.classList.toggle('active')};
document.addEventListener('click',e=>{if(!n.contains(e.target)&&!m.contains(e.target)){n.classList.remove('a');m.classList.remove('active')}});

// Toggle donation cards
function t(i){document.querySelectorAll('.u').forEach(e=>{if(e.id!=i)e.classList.remove('a');});document.getElementById(i).classList.toggle('a');}

// Chat widget
const API_URL = "/api/chat";
let myRoomId = localStorage.getItem('chat_room_id');
if (!myRoomId ||!myRoomId.startsWith('User_') || isNaN(myRoomId.split('_')[1])) {
    const rawNumberId = Math.floor(Math.random() * 10000) + 1;
    myRoomId = `User_${rawNumberId}`;
    localStorage.setItem('chat_room_id', myRoomId);
}
const b=document.getElementById("cb"),bb=document.getElementById("b"),c=document.getElementById("c"),l=document.getElementById("l"),e=document.getElementById("e"),i=document.getElementById("i"),j=document.getElementById("j"),k=document.getElementById("k");let o=0,u=0,last=0,poll=null,x,y,lx,ly,drag=0;
const B=()=>{bb.textContent=u>9?'9+':u;bb.style.display=u?'flex':'none'};
const A=(t,cls)=>{const d=document.createElement('div');d.className=cls;d.innerHTML=t;e.appendChild(d);e.scrollTop=e.scrollHeight;if(!o&&cls=='f'){u++;B()}};
const G=()=>{const z=b.getBoundingClientRect();let q=z.top-c.offsetHeight-10,w=z.right+10;if(w+c.offsetWidth>innerWidth-10)w=z.left-c.offsetWidth-10;if(q<10)q=z.bottom+10;c.style.top=Math.min(Math.max(q,10),innerHeight-c.offsetHeight-10)+'px';c.style.left=Math.min(Math.max(w,10),innerWidth-c.offsetWidth-10)+'px'};

async function send(t){if (!myRoomId) return;await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sender:'user',text:t,roomId:myRoomId})}).catch(()=>A('⚠️ Failed to send message','f'))}
async function check(){if (!myRoomId) return;try{const r=await fetch(`${API_URL}?roomId=${myRoomId}`);if(!r.ok)return;const data = await r.json();if (o) {if(data.userUnread > 0) {await fetch(API_URL, {method: 'PATCH',headers: { 'Content-Type': 'application/json' },body: JSON.stringify({ roomId: myRoomId, clearFor: 'user' })})}u = 0;B();} else { u = data.userUnread || 0;B();}const messageList = data.messages || [];if (e.children.length === 0 && messageList.length > 0) { last = 0;}if(messageList.length>last){messageList.slice(last).forEach(m=>{try {let txt = ""; let cls = "f";if (typeof m === 'object' && m!== null) { txt = m.text; cls = (m.sender === 'admin')? 'f' : 'g';} else if (typeof m === 'string') { if (m.startsWith("{")) { const parsed = JSON.parse(m); txt = parsed.text; cls = (parsed.sender === 'admin')? 'f' : 'g'; } else { txt = m; }}if (txt) A(txt, cls);} catch(err){}});last=messageList.length}}catch(e){}}
const S=async()=>{const v=i.value.trim();if(!v)return;i.value='';await send(v);setTimeout(check, 100);};
b.onclick=async()=>{ if(drag)return;o=!o;if(o){G();c.style.display='flex';c.onclick = (ev) => ev.stopPropagation(); u=0;B(); if(myRoomId) {await fetch(API_URL, {method: 'PATCH',headers: { 'Content-Type': 'application/json' },body: JSON.stringify({ roomId: myRoomId, clearFor: 'user' })})}; e.innerHTML = ''; last = 0; await check(); if(!poll) poll = setInterval(check,3000)}else{c.style.display='none';c.onclick = null;}};

// Community Projects PDF button opens chat
document.getElementById('pdf-chat-btn').onclick = function(){
  if(!o){b.click()}
  setTimeout(()=>{
    i.value='hey 👋 I want to download pdf';
    S();
  },400);

j.onclick=S;
i.onkeydown=x=>x.key=='Enter'&&S();
k.onclick=()=>{if(o)return;o=1;A('Connecting you to Admin...','f')};

// Draggable chat button
const move=ev=>{if(!o){drag=1;const t=(ev.touches && ev.touches.length)? ev.touches[0] : ev;b.style.bottom=b.style.right="auto";b.style.left=(lx+t.clientX-x)+"px";b.style.top=(ly+t.clientY-y)+"px";}};
const start=ev=>{const targetId = ev.target.id;if (targetId === 'i' || targetId === 'j' || ev.target.tagName === 'INPUT' || ev.target.tagName === 'BUTTON') {return;}if(!o){drag=0;const t=(ev.touches && ev.touches.length)? ev.touches[0] : ev;x=t.clientX;y=t.clientY;lx=b.offsetLeft;ly=b.offsetTop;document.onmousemove=document.ontouchmove=move;document.onmouseup=document.ontouchend=()=>{document.onmousemove=document.ontouchmove=null;setTimeout(()=>drag=0,100)}}};
b.onmousedown=b.ontouchstart=start;b.ondragstart=ev=>ev.preventDefault();
addEventListener('resize',()=>{if(o)G()});

// Active nav on scroll
const sections = document.querySelectorAll('section');
const activeNavTabs = document.querySelectorAll('.t');
const observer = new IntersectionObserver(entries=>{entries.forEach(entry=>{if(entry.isIntersecting){activeNavTabs.forEach(t=>t.classList.remove('active'));const id = entry.target.getAttribute('id');document.querySelector(`.t[href="#${id}"]`)?.classList.add('active');}})},{threshold:0.5});
sections.forEach(s=>observer.observe(s));

setInterval(check, 4000);check();

}); // END DOMCONTENTLOADED
</script>
